# Used by GitHub Actions only. Set SP_DMG_SUFFIX per build:
#   ""           → SettingsPlus-1.2.3.dmg (universal — default / recommended)
#   "-silicon"   → Apple Silicon (arm64)
#   "-intel"     → Intel (x64)
# Local `npm run dist` still uses electron-builder.yml (dir target).
appId: dev.settingsplus.app
productName: SettingsPlus
copyright: Copyright © 2026 SettingsPlus contributors

directories:
  output: release
  buildResources: build

files:
  - package.json
  - out/**/*

asar: true

mac:
  category: public.app-category.utilities
  artifactName: "${productName}-${version}${env.SP_DMG_SUFFIX}.dmg"
  target:
    - dmg
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

dmg:
  window:
    width: 560
    height: 400
  contents:
    - x: 120
      y: 220
    - x: 260
      y: 220
      type: file
      path: build/open-settingsplus.command
      name: "Open first time.command"
    - x: 420
      y: 220
      type: link
      path: /Applications
